  #   runs-on: ubuntu-latest
  #   needs: [unit-test]
  #   if: vars.RUN_INTEGRATION == 'true'
  #   permissions:
  #     contents: read
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Set up Python
  #       uses: actions/setup-python@v7
  #       with:
  #         python-version: '3.12'
  #     - name: Install nox
  #       run: pip install nox
  #     - name: Authenticate to GCP
  #       run: |
  #         echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json
  #         echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json" >> $GITHUB_ENV
  #     - name: Run integration tests
  #       run: nox -s integration
  #       env:
  #         GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  #         GCP_DATASET: ${{ secrets.GCP_DATASET }}

  dependabot:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'masthead-data/dbt-reservations'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: unit-test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
