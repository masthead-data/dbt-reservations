name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install nox
        run: pip install nox
      - name: Run unit tests
        run: nox

  # ---------------------------------------------------------------------------
  # Integration tests — uncomment and set the following repo variable to enable:
  #   Settings → Variables → Actions → RUN_INTEGRATION = true
  #
  # Required secrets:
  #   GCP_SA_KEY   — JSON key for a service account with BigQuery access
  #   GCP_PROJECT  — GCP project ID
  #   GCP_DATASET  — BigQuery dataset for test runs
  # ---------------------------------------------------------------------------
